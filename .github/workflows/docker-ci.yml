name: Docker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build application image
        run: docker build -t movieflix-app:ci ./app

      - name: Start container and test response
        run: |
          docker run -d --rm -p 5000:5000 --name movieflix-test movieflix-app:ci
          for i in {1..10}; do
            if curl --silent --fail http://127.0.0.1:5000/; then
              break
            fi
            sleep 2
          done
          curl --silent --fail http://127.0.0.1:5000/
          docker stop movieflix-test

      - name: Push Docker image to Docker Hub
        run: |
          docker tag movieflix-app:ci ${{ secrets.DOCKERHUB_USERNAME }}/movieflix-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movieflix-app:latest
